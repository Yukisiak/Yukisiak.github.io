    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 24px;
            height: 24px;
            border: 2px solid #f00;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
            border-radius: 50%;
        }

            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;

            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 420px;
            z-index: 20;
            pointer-events: none;
        }

        #overlay,
        #death {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #f00;
            z-index: 100;
            text-align: center;
        }

        #damage-flash {
            position: absolute;
            inset: 0;
            background: red;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
            transition: opacity 0.1s;
        }

        button {
            background: #f00;
            color: #000;
            border: none;
            padding: 15px 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.5rem;
        }
    </style>

            // Zmodyfikuj nasłuchiwanie zdarzenia mousemove
            document.addEventListener('mousemove', (e) => {

                    pitch -= e.movementY * 0.002;

                    // Blokada: nie pozwól patrzeć bardziej niż pionowo w górę/dół

                    camera.rotation.x = pitch;
                }
            });

        function createHPBar() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 16;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#300'; ctx.fillRect(0, 0, 128, 16);
            ctx.fillStyle = '#f00'; ctx.fillRect(0, 0, 128, 16);
            const tex = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex }));
            sprite.scale.set(2.2, 0.2, 1);
            sprite.position.y = 1.3;
            return sprite;
        }

        function spawn() {
            if (stats.dead || enemies.length > 70) return;
            const mat = new THREE.SpriteMaterial({ transparent: true });
            new THREE.TextureLoader().load(ENEMY_URL, (t) => { mat.map = t; });
            const s = new THREE.Sprite(mat);
            s.scale.set(3, 3, 1);

            let ex, ez;
            // Bezpieczny spawn z dala od gracza
            do {
                ex = (Math.random() - 0.5) * (SIZE - 10);
                ez = (Math.random() - 0.5) * (SIZE - 10);
            } while (isWall(ex, ez) || Math.abs(ex) < 15 || Math.abs(ez) < 15);

            s.position.set(ex, 1.5, ez);
            const hpBar = createHPBar();
            s.add(hpBar);

            s.userData = {
                maxHp: 3 + Math.floor(stats.threat / 2),
                hp: 3 + Math.floor(stats.threat / 2),
                speed: 4 + (stats.threat * 0.3),
                hpBar: hpBar
            };
            enemies.push(s);
            scene.add(s);
        }

            const fallbackColor = type === 'hp' ? 0x00ff00 : 0x0000ff;

            const texture = new THREE.TextureLoader().load(
                texturePath,
                (tex) => {
                    // KLUCZ DO KONTRASTU: Ustawienie poprawnej przestrzeni kolorów
                    // Zapobiega to efektowi "wypranych" barw
                    tex.colorSpace = THREE.SRGBColorSpace;
                },
                undefined,
                (err) => {
                    sprite.material.map = null;
                    sprite.material.color.setHex(fallbackColor);
                }
            );

            const spriteMaterial = new THREE.SpriteMaterial({
                map: texture,
                color: 0xffffff, // Pozostaw czysty biały, by nie nakładać filtra
                transparent: true,
                // Dodatki poprawiające widoczność:
                toneMapped: false // Wyłącza wpływ globalnego mapowania tonów (zapobiega szarzeniu)
            });

            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(2, 2, 1);
            sprite.position.copy(pos);
            sprite.position.y = 0.6;
            sprite.userData = { type: type };

            pickups.push(sprite);
            scene.add(sprite);
        }

        function shoot() {
            if (stats.ammo <= 0 || stats.dead || !document.pointerLockElement) return;
            stats.ammo--;

            const gun = document.getElementById('gun');
            gun.style.transform = "translateX(-50%) translateY(40px) scale(0.8)";
            setTimeout(() => gun.style.transform = "translateX(-50%) translateY(0) scale(1)", 70);

            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const hits = raycaster.intersectObjects(enemies);

            if (hits.length > 0) {
                const target = hits[0].object;
                target.userData.hp -= 1;

                // Update HP Bar
                const canvas = target.userData.hpBar.material.map.image;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#300'; ctx.fillRect(0, 0, 128, 16);
                ctx.fillStyle = '#f00'; ctx.fillRect(0, 0, 128 * (target.userData.hp / target.userData.maxHp), 16);
                target.userData.hpBar.material.map.needsUpdate = true;

                if (target.userData.hp <= 0) {
                    if (Math.random() < 0.75) spawnPickup(target.position);
                    scene.remove(target);
                    enemies = enemies.filter(e => e !== target);
                    stats.score += 300;
                    stats.kills += 1;
                    if (stats.kills % 5 === 0) stats.threat += 1;
                }
            }
            updateHUD();
        }

        function updateHUD() {
            document.getElementById('hp').innerText = Math.max(0, Math.ceil(stats.hp));
            document.getElementById('ammo').innerText = stats.ammo;
            document.getElementById('score').innerText = stats.score;
            document.getElementById('kills').innerText = stats.kills;
            document.getElementById('threat').innerText = stats.threat;
        }

        function isWall(x, z) {
            const r = 1.2;
            for (let w of walls) {
                if (x > w.position.x - CELL / 2 - r && x < w.position.x + CELL / 2 + r &&
                    z > w.position.z - CELL / 2 - r && z < w.position.z + CELL / 2 + r) return true;
            }
            return false;
        }

        function animate() {
            requestAnimationFrame(animate);
            if (stats.dead) return;
            const delta = Math.min(clock.getDelta(), 0.05);

            if (document.pointerLockElement) {
                const speed = 17 * delta;
                let dx = 0, dz = 0;

                if (move.f) { dx -= Math.sin(camera.rotation.y) * speed; dz -= Math.cos(camera.rotation.y) * speed; }
                if (move.b) { dx += Math.sin(camera.rotation.y) * speed; dz += Math.cos(camera.rotation.y) * speed; }
                if (move.l) { dx -= Math.cos(camera.rotation.y) * speed; dz += Math.sin(camera.rotation.y) * speed; }
                if (move.r) { dx += Math.cos(camera.rotation.y) * speed; dz -= Math.sin(camera.rotation.y) * speed; }

                if (!isWall(camera.position.x + dx, camera.position.z)) camera.position.x += dx;
                if (!isWall(camera.position.x, camera.position.z + dz)) camera.position.z += dz;

                // Pickupy - NAPRAWIONE PODNOSZENIE
                for (let i = pickups.length - 1; i >= 0; i--) {
                    const p = pickups[i];
                    p.rotation.y += 0.05;
                    p.position.y = 0.6 + Math.sin(Date.now() * 0.005) * 0.2;
                    if (p.position.distanceTo(camera.position) < 2.0) {
                        if (p.userData.type === 'hp') stats.hp = Math.min(100, stats.hp + 20);
                        if (p.userData.type === 'ammo') stats.ammo += 25;
                        scene.remove(p);
                        pickups.splice(i, 1);
                        updateHUD();
                    }
                }

                enemies.forEach(e => {
                    const dist = e.position.distanceTo(camera.position);
                    const dir = new THREE.Vector3().subVectors(camera.position, e.position).normalize();
                    const es = e.userData.speed * delta;
                    if (!isWall(e.position.x + dir.x * es, e.position.z)) e.position.x += dir.x * es;
                    if (!isWall(e.position.x, e.position.z + dir.z * es)) e.position.z += dir.z * es;
                    if (dist < 1.8) {
                        stats.hp -= 40 * delta;
                        document.getElementById('damage-flash').style.opacity = "0.4";
                        setTimeout(() => document.getElementById('damage-flash').style.opacity = "0", 50);
                        updateHUD();
                    }
                });
            }

            if (stats.hp <= 0) {
                stats.dead = true;
                document.getElementById('finalScore').innerText = stats.score;
                document.getElementById('death').style.display = 'flex';
                document.exitPointerLock();
            }
            renderer.render(scene, camera);
        }

        document.getElementById('startBtn').onclick = () => {
            document.body.requestPointerLock();
            document.getElementById('overlay').style.display = 'none';
            clock.start();
        };

        init();
        animate();
    </script>
